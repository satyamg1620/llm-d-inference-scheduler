# Bare-metal EPP scheduler config — SIMULATOR variant.
#
# This config drops the precise-prefix-cache-scorer (which needs real ZMQ KV
# events from vLLM that the simulator does not publish) and instead uses the
# approximate prefix-cache scorer + decode-filter + max-score-picker.
#
# Used by scripts/baremetal/smoke-test.sh against ghcr.io/llm-d/llm-d-inference-sim.
apiVersion: llm-d.ai/v1alpha1
kind: EndpointPickerConfig
plugins:
  - type: prefix-cache-scorer
    parameters:
      maxPrefixBlocksToMatch: 256
      lruCapacityPerServer: 31250
  - type: decode-filter
  - type: max-score-picker
  - type: single-profile-handler
schedulingProfiles:
  - name: default
    plugins:
      - pluginRef: decode-filter
      - pluginRef: max-score-picker
      - pluginRef: prefix-cache-scorer
        weight: 2
